# Blueprint for https://render.com — adjust names/plan/region as needed.
# After deploy, set ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS, and CSRF_TRUSTED_ORIGINS
# to your Render URL and Vercel URL (see Backend/.env.example).

services:
  - type: web
    name: quicknote-backend
    runtime: python
    plan: free
    rootDir: Backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn notesbackend.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/notes/
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.4"
      - key: DEBUG
        value: "False"
      # Set in the Render dashboard (or use generate/secret manager):
      # SECRET_KEY, ALLOWED_HOSTS, CORS_ALLOWED_ORIGINS, CSRF_TRUSTED_ORIGINS
      # Optional: DATABASE_URL from a Render PostgreSQL instance (recommended over SQLite).
